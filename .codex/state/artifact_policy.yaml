schema_version: 1
last_reviewed: 2026-06-26
owner: user
policy:
  active_runtime:
    cpx_agent:
      - cpx_agent/data/bad_news
  generated:
    cpx_agent:
      - cpx_agent/data/sessions
      - cpx_agent/data/reports
  scratch:
    cpx_agent:
      - tmp

rules:
  - Do not treat generated session logs as source of truth.
  - Imported bad-news cases are editable demo scenario inputs, not real patient records.
  - Do not store real patient data, student personal data, API keys, or secrets.
  - Keep demo cases synthetic or curated for education only.
  - Generated reports are demo artifacts and may be regenerated.
  - Do not delete generated artifacts without a concrete user instruction and reason.
  - If a report is used for judging a prompt or app change, keep the source bad-news case and prompt version together.
