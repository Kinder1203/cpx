schema_version: 1
last_reviewed: 2026-06-28
owner: user
track: cpx_agent
status: functional_vertical_slice

source_of_truth:
  root_readme: README.md
  root_agents: AGENTS.md
  track_readme: cpx_agent/README.md
  track_agents: cpx_agent/AGENTS.md
  protocol: cpx_agent/docs/cpx_protocol.md
  prompt_dir: cpx_agent/prompts
  patient_card_dir: cpx_agent/data/patient_cards
  app_setup_dir: docs/app
  app_prd: docs/app/prd.md
  app_functional_spec: docs/app/functional_spec.md
  app_user_flows: docs/app/user_flows.md
  app_wireframes: docs/app/wireframes.md
  app_design: docs/app/design.md
  app_serious_simulation_direction: docs/app/serious_simulation_direction.md
  app_frontend_stack_decision: docs/app/frontend_stack_decision.md
  app_pixel_asset_pipeline: docs/app/pixel_asset_pipeline.md
  app_design_reference_intake: docs/app/design_reference_intake.md
  app_visual_quality_bar: docs/app/visual_quality_bar.md
  runtime_core: cpx_agent/src
  browser_client: app
  android_runner: android

current_stance:
  event: 2026 CODE MEDI medical AI/SW hackathon
  expected_product: LLM 기반 CPX 표준화 환자 에이전트
  stage: harness_backed_functional_vertical_slice
  app_direction: 2d_pixel_cpx_serious_simulation
  design_priority: preserve_existing_visual_direction_after_functional_contract
  backend_stance: standard_library_sqlite_session_service_with_card_driven_core
  learner_input_mode: single_free_text_question
  evaluation_mode: deterministic_card_defined_rules_with_disclosed_evidence_only
  adaptive_mode: deterministic_dual_mode_release_eligible_card_library_selection
  patient_card_count: 2
  demo_only_card_count: 2
  clinically_validated_card_count: 0
  patient_card_schema_version: 1.2.0
  session_persistence: local_sqlite_snapshot_and_event_log
  evaluation_scope: versioned_card_based_formative_not_formally_validated
  learner_assessment_fields:
    - problem_summary
    - primary_impression
    - differential_diagnoses
    - reasoning
  retired_ui_concepts:
    - mission_map
    - structured_question_cards
    - patient_stability_trust_risk_hud
    - turn_counter
    - pre_reasoning_decision_board
  app_setup_profile: lightweight_docs_first_optional_mcp
  app_framework_decided: true
  llm_provider_decided: true
  llm_provider: codex_cli_optional_concept_matcher
  codex_reasoning_effort: low
  codex_timeout_seconds: 8
  codex_resilience: deterministic_fallback_cache_and_circuit_breaker
  api_key_required_now: false
  real_patient_data_allowed: false
  diagnosis_or_treatment_product_goal: false
  hidden_diagnosis_may_be_shown_to_user: false
  internal_prompt_may_be_shown_to_user: false

cpx_contract:
  patient_card_driven: true
  patient_role_only: true
  reveal_only_when_asked: true
  preserve_conversation_consistency: true
  evaluate_after_encounter: true
  supports_day_of_case_swap: true
  required_patient_card_sections:
    - schema_version
    - publication
    - evidence
    - evaluation_metadata
    - curriculum_metadata
    - patient_profile
    - disclosure_policy
    - conversation_style
    - cpx_checklist
    - clinical_assessment_rubric
    - adaptive_curriculum
    - safety_notes

prompt_contract:
  patient_role_prompt: cpx_agent/prompts/patient_role.md
  evaluator_prompt: cpx_agent/prompts/evaluator.md
  safety_prompt: cpx_agent/prompts/safety.md
  must_block:
    - hidden_diagnosis_leak
    - internal_prompt_leak
    - evaluator_key_leak
    - doctor_role_switch
    - treatment_instruction
    - patient_card_fact_fabrication

harness:
  prompt_harness: tools/prompt_harness.py
  sample_patient_card: cpx_agent/data/patient_cards/chest_pain_example.json
  validation:
    - python tools/healthcheck.py
    - python -m unittest discover -s cpx_agent/tests -p "test_*.py"

project_structure:
  active_skills:
    - cpx-orient
    - pre-implementation-grill
    - cpx-guard
    - prompt-harness
    - diagnose-failure
    - state-hygiene
    - context-checkpoint
    - app-product-spec
    - app-design-system
    - app-ui-qa
  generated_artifacts:
    - cpx_agent/data/sessions
    - cpx_agent/data/reports
  runtime_modules:
    - cpx_agent/src/cpx_core.py
    - cpx_agent/src/cpx_service.py
    - cpx_agent/src/cpx_server.py
    - cpx_agent/src/codex_patient.py
    - cpx_agent/src/session_store.py
  state_budget:
    active_state_soft_max_lines: 800
    active_state_soft_max_kib: 36
    policy: review_for_compaction_when_budget_is_exceeded_do_not_fail_on_size_alone

app_setup:
  docs_dir: docs/app
  prd: docs/app/prd.md
  functional_spec: docs/app/functional_spec.md
  user_flows: docs/app/user_flows.md
  wireframes: docs/app/wireframes.md
  design_contract: docs/app/design.md
  serious_simulation_direction: docs/app/serious_simulation_direction.md
  frontend_stack_decision: docs/app/frontend_stack_decision.md
  pixel_asset_pipeline: docs/app/pixel_asset_pipeline.md
  design_reference_intake: docs/app/design_reference_intake.md
  visual_quality_bar: docs/app/visual_quality_bar.md
  default_frontend_path: vanilla_html_css_js_with_python_service
  android_runner: webview_to_host_service
  pixel_asset_contract: individual_png_css_backgrounds_future_spritesheet_metadata
  optional_mcp_profile: .codex/mcp_profiles/app_ui_optional.toml
  default_tooling: docs_first_harness_first_cli_first
  playwright_mcp: optional_for_persistent_browser_state_or_long_ui_loops_not_default
  figma_mcp: optional_official_remote_when_a_specific_figma_source_exists
  figma_community_files: inspiration_or_reviewed_source_only_not_untrusted_runtime
  keep_disabled_by_default: true

day_of_event_rules:
  - 세부 질환이 공개되면 먼저 환자 카드와 체크리스트를 채운다.
  - 앱 프레임워크보다 CPX 역할 계약과 안전장치를 먼저 고정한다.
  - 의대생 팀원이 의료 시나리오와 체크리스트를 검토한다.
  - SW 팀원은 UI, LLM 호출, 로그, 평가 리포트를 얇게 연결한다.
  - 발표는 단순 챗봇이 아니라 교육용 표준화 환자 시뮬레이터임을 강조한다.
